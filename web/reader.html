<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>卡片讀取器 — RFID Card Game</title>
<style>
  :root {
    --bg: #0f1115; --panel: #1a1d24; --panel2: #232732;
    --accent: #4cc9f0; --accent2: #f9c74f;
    --text: #e6e6e6; --muted: #8a8f99;
    --ok: #5ee08a; --err: #ff6b6b; --border: #2c313b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 24px;
  }
  .topbar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .back { font-size: 13px; color: var(--muted); text-decoration: none; margin-right: 4px; }
  .back:hover { color: var(--text); }
  h1 { margin: 0; font-size: 18px; flex: 1; }
  button {
    background: var(--accent); color: #08121a;
    border: none; padding: 9px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: transparent; color: var(--text); border: 1px solid var(--border);
  }
  .status { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.connected { background: var(--ok); }
  .dot.error { background: var(--err); }
  @keyframes pulse { 50% { opacity: 0.3; } }

  .layout { display: grid; grid-template-columns: 1fr 320px; gap: 16px; }
  @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }

  .panel { background: var(--panel); border-radius: 8px; padding: 16px; }
  h2 { margin: 0 0 12px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  .card-large {
    background: var(--panel2);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 12px;
    border-left: 4px solid var(--accent);
    animation: fadein 0.2s ease;
  }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
  .card-large.skill { border-left-color: #9b5de5; }
  .card-large.rps   { border-left-color: var(--accent2); }
  .card-large.unknown { border-left-color: var(--err); }

  .card-large .cname { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .card-large .cuid { font-size: 11px; color: var(--muted); font-family: monospace; margin-bottom: 14px; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 11px; font-weight: 600; margin-left: 8px;
    background: var(--accent); color: #08121a;
  }
  .badge.skill { background: #9b5de5; color: #fff; }
  .badge.rps { background: var(--accent2); }
  .badge.unknown { background: var(--err); color: #fff; }
  .stat-row { display: flex; gap: 20px; flex-wrap: wrap; }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-item .label { font-size: 11px; color: var(--muted); }
  .stat-item .value { font-size: 22px; font-weight: 700; }

  .history-list .hcard {
    background: var(--panel2); border-radius: 4px; padding: 8px 10px;
    margin-bottom: 6px; font-size: 12px;
    border-left: 3px solid var(--accent);
  }
  .history-list .hcard.skill { border-left-color: #9b5de5; }
  .history-list .hcard.rps { border-left-color: var(--accent2); }
  .history-list .hcard .hname { font-weight: 600; font-size: 13px; }
  .history-list .hcard .huid { color: var(--muted); font-family: monospace; font-size: 10px; }

  .log {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; max-height: 200px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all;
  }
  .log .line { margin-bottom: 2px; color: var(--muted); }
  .log .line.json { color: var(--accent); }
  .log .line.err { color: var(--err); }
  .empty { color: var(--muted); font-size: 13px; }

  .clear-btn { float: right; font-size: 11px; cursor: pointer; color: var(--muted); background: none; border: none; padding: 0; }
  .clear-btn:hover { color: var(--text); }
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html">← 返回</a>
  <h1>📡 卡片讀取器</h1>
  <button id="connectBtn">連接 ESP32</button>
  <button id="disconnectBtn" class="secondary" disabled>中斷</button>
  <span class="status"><span class="dot" id="statusDot"></span><span id="statusText">未連接</span></span>
</div>

<div class="layout">
  <!-- 最新卡片 -->
  <div style="display:flex;flex-direction:column;gap:16px;">
    <div class="panel">
      <h2>最新感應卡片</h2>
      <div id="latest"><div class="empty">等待感應卡片...</div></div>
    </div>
    <div class="panel">
      <h2>序列 Log <button class="clear-btn" id="clearLog">清除</button></h2>
      <div class="log" id="log"><div class="empty">等待裝置輸出...</div></div>
    </div>
  </div>

  <!-- 歷史 -->
  <div class="panel">
    <h2>感應歷史 <button class="clear-btn" id="clearHistory">清除</button></h2>
    <div class="history-list" id="history"><div class="empty">尚無記錄</div></div>
  </div>
</div>

<script type="module">
import { SerialConnection, escapeHtml, badgeFor, statsHtml } from './serial.js';

const $ = id => document.getElementById(id);
const latestEl = $('latest'), historyEl = $('history'), logEl = $('log');
const connectBtn = $('connectBtn'), disconnectBtn = $('disconnectBtn');
const statusDot = $('statusDot'), statusText = $('statusText');

function setStatus(text, state) {
  statusText.textContent = text;
  statusDot.className = 'dot' + (state ? ' ' + state : '');
}

function logLine(text, cls = '') {
  if (logEl.querySelector('.empty')) logEl.innerHTML = '';
  const d = document.createElement('div');
  d.className = 'line ' + cls;
  d.textContent = text;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function typeClass(type) {
  return { SKILL: 'skill', RPS: 'rps', UNKNOWN: 'unknown' }[type] ?? '';
}

function showLatest(card) {
  const cls = typeClass(card.type);
  latestEl.innerHTML = `
    <div class="card-large ${cls}">
      <div class="cname">${escapeHtml(card.name || '(未命名)')} ${badgeFor(card.type || 'UNKNOWN')}</div>
      <div class="cuid">UID: ${escapeHtml(card.uid || '')}</div>
      <div class="stat-row">${buildStatItems(card)}</div>
    </div>`;
}

function buildStatItems(c) {
  if (c.type === 'CHARACTER') return [
    ['HP', c.hp], ['✊ 石頭', c.atk_rock], ['✌️ 剪刀', c.atk_scissors], ['✋ 布', c.atk_paper]
  ].map(([l, v]) => `<div class="stat-item"><span class="label">${l}</span><span class="value">${v ?? '-'}</span></div>`).join('');
  if (c.type === 'SKILL') return [
    ['回血', c.hp_heal], ['✊×', c.mul_rock], ['✌️×', c.mul_scissors], ['✋×', c.mul_paper]
  ].map(([l, v]) => `<div class="stat-item"><span class="label">${l}</span><span class="value">${v ?? '-'}</span></div>`).join('');
  if (c.type === 'RPS') return `<div class="stat-item"><span class="label">出招</span><span class="value">${escapeHtml(c.rps ?? '-')}</span></div>`;
  return '';
}

function addHistory(card) {
  if (historyEl.querySelector('.empty')) historyEl.innerHTML = '';
  const d = document.createElement('div');
  d.className = 'hcard ' + typeClass(card.type);
  d.innerHTML = `<div class="hname">${escapeHtml(card.name || '(未命名)')} ${badgeFor(card.type || 'UNKNOWN')}</div>
    <div class="huid">${escapeHtml(card.uid || '')}</div>`;
  historyEl.prepend(d);
  while (historyEl.children.length > 20) historyEl.removeChild(historyEl.lastChild);
}

const conn = new SerialConnection({
  onConnect() {
    setStatus('已連接', 'connected');
    connectBtn.disabled = true;
    disconnectBtn.disabled = false;
  },
  onDisconnect() {
    setStatus('未連接');
    connectBtn.disabled = false;
    disconnectBtn.disabled = true;
  },
  onLine(text) {
    logLine(text, text.startsWith('{') ? 'json' : '');
  },
  onMessage(msg) {
    const card = msg.card ?? (msg.type && !msg.event ? msg : null);
    if (card) { showLatest(card); addHistory(card); }
  },
});

connectBtn.addEventListener('click', async () => {
  try { await conn.connect(); }
  catch (e) {
    if (e.name !== 'NotFoundError') { setStatus('連接失敗', 'error'); logLine('[error] ' + e.message, 'err'); }
  }
});
disconnectBtn.addEventListener('click', () => conn.disconnect());
$('clearLog').addEventListener('click', () => { logEl.innerHTML = '<div class="empty">等待裝置輸出...</div>'; });
$('clearHistory').addEventListener('click', () => { historyEl.innerHTML = '<div class="empty">尚無記錄</div>'; });
</script>
</body>
</html>
